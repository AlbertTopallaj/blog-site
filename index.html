</head>
<body>

  <div class="slides">

      <img src="img1.webp" alt="Blog Post 1">
    </a>

    <a href="#post2" class="slide">
      <img src="img2.jpg" alt="Blog Post 2">
    </a>

    <a href="#post3" class="slide">
      <img src="img3.jpg" alt="Blog Post 3">
    </a>
  </div>

  <div class="dots">
    <label for="s1"></label>
    <label for="s2"></label>
    <label for="s3"></label>
  </div>

</div>
